experiment:
  name: stage1_5_strict_qwen3_1_7b_local
  output_root: outputs/stage1_5_strict_qwen3_1_7b_local
  swanlab_project: "stage1-5-strict-qwen3-1.7b"
  swanlab_workspace: yyhdbl
  swanlab_api_key: w5i4zEmPe04Nm4ul9RloZ

model:
  id: models/Qwen3-1.7B-Base
  revision: null
  tokenizer_revision: null
  cache_dir: .hf-cache/hub
  dtype: bfloat16
  attn_implementation: sdpa
  load_in_4bit: false
  load_in_8bit: false
  trust_remote_code: false

data:
  dataset_id: HuggingFaceH4/no_robots
  dataset_revision: null
  train_split: train
  validation_split: test
  output_dir: data/instruction/stage1_5

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: all-linear
  bias: none
  task_type: CAUSAL_LM
  modules_to_save: ["lm_head"]

training:
  max_length: 1024
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  assistant_only_loss: true
  packing: false
  learning_rate: 0.00005
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  optim: adamw_torch_fused
  logging_steps: 1
  save_steps: 10
  eval_steps: 10
  save_total_limit: 2
  # 启用 best checkpoint：训练结束加载 eval_loss 最低的 checkpoint，保存到 adapter/
  # best checkpoint 不会被 save_total_limit 删除，会额外保留
  # 因此最终 checkpoints/ 下保留：最新 2 个 + best 1 个（若 best 不在最新 2 个内）
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  max_steps: -1
  num_train_epochs: 1
  seed: 42
  bf16: true
  tf32: true
  overfit_examples: 16
  overfit_steps: 40
  smoke_examples: 256
  smoke_steps: 20

generation:
  max_new_tokens: 128
  do_sample: false

evaluation:
  dev_path: data/instruction/stage1_5/validation_strict.jsonl
  test_path: data/eval/instruction_test.jsonl
  batch_size: 1
  max_new_tokens: 128

init_adapter_path: outputs/stage1_no_robots_qwen3_1_7b_local/formal/adapter
